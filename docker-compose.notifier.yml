# Append this service to your Cap docker-compose.yml in Coolify.
# Being in the same compose project means the notifier can discover
# cap-web via Docker labels automatically.

services:
  link-notifier:
    image: 'ghcr.io/danielmichaels/cap-link-notifier:latest'
    restart: unless-stopped
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    environment:
      - 'TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}'
      - 'TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}'
      - SERVICE_VALUE=cap-web
      - CONTAINER_NAME_PREFIX=cap-web
